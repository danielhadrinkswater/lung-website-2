<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lung Sounds Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       CSS VARIABLES
       ============================================================ */
    :root {
      --accent:        #4a6fa5;
      --accent-faint:  #eef2f8;

      --color-trachea:    #c49a3c;
      --color-bronchi:    #c49a3c;
      --color-alveoli:    #4a8c78;
      --color-pleura:     #7c6fa0;
      --color-parenchyma: #5580b0;
      --color-normal:     #4a6fa5;

      --bg:           #f5f5f3;
      --surface:      #ffffff;
      --surface-2:    #f0f0ee;
      --border:       #e4e4e0;

      --text-primary:   #1a1a1a;
      --text-secondary: #5a5a58;
      --text-muted:     #9a9a96;

      --radius-sm:  4px;
      --radius-md:  8px;
      --radius-lg:  12px;

      --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 2px 8px rgba(0,0,0,.07);

      --transition-fast:   0.15s ease;
      --transition-layout: 0.40s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ============================================================
       HEADER
       ============================================================ */
    .site-header {
      padding: 48px 24px 36px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .site-header h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 300;
      font-style: italic;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      line-height: 1.15;
      margin-bottom: 10px;
    }

    .site-header .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 300;
      max-width: 380px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ============================================================
       MAIN WRAPPER
       ============================================================ */
    .main-content {
      max-width: 1000px;
      margin: 0 auto;
      padding: 36px 24px 0;
    }

    /* ============================================================
       VISUALIZATION PANEL
       Default: single column (SVG centred).
       .sound-selected: two-column layout (desktop only).
       No overflow:hidden — iOS Safari bug avoidance.
       ============================================================ */
    .viz-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px;
      margin-bottom: 40px;

      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      align-items: start;
      transition: grid-template-columns var(--transition-layout);
    }

    /* Two-column layout triggered by JS adding .sound-selected */
    .viz-panel.sound-selected {
      grid-template-columns: 200px 1fr;
      gap: 36px;
    }

    /* ============================================================
       LUNG SVG COLUMN
       ============================================================ */
    .svg-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #lung-svg {
      width: 100%;
      max-width: 220px;
      height: auto;
      display: block;
      margin: 0 auto;
      transition: max-width var(--transition-layout);
    }

    .viz-panel.sound-selected #lung-svg { max-width: 180px; }

    /* ============================================================
       SVG REGION HIGHLIGHT SYSTEM
       All regions default to opacity 0.08 (near-invisible).
       JS adds .highlighted → opacity 0.85 + colour glow.
       Each <g> has --region-color set inline for its glow colour.
       ============================================================ */
    .svg-region {
      opacity: 0.08;
      transition: opacity 0.30s ease, filter 0.30s ease;
    }

    .svg-region.highlighted {
      opacity: 0.85;
      filter: drop-shadow(0 0 5px var(--region-color, #4a6fa5));
    }

    /* Lung outlines always visible */
    .lung-outline { opacity: 1; }

    /* Legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      margin-top: 18px;
      justify-content: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .legend-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      opacity: 0.7;
    }

    /* ============================================================
       INFO COLUMN
       Desktop: display:none until JS sets display:flex on selection.
       Mobile (<=680px): display:flex unconditionally via !important.
       No overflow:hidden anywhere — iOS Safari.
       ============================================================ */
    .info-column {
      display: none;
      flex-direction: column;
      gap: 18px;
      min-width: 0;
    }

    /* Placeholder shown before any sound is selected */
    #info-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px 16px;
      gap: 10px;
      color: var(--text-muted);
    }

    #info-placeholder svg { opacity: 0.35; }

    #info-placeholder p {
      font-size: 13px;
      line-height: 1.6;
      font-weight: 300;
    }

    /* Sound name */
    .info-name {
      font-family: 'Fraunces', serif;
      font-size: clamp(20px, 3vw, 26px);
      font-weight: 300;
      line-height: 1.2;
      color: var(--text-primary);
    }

    /* Region label */
    .info-region-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-region-label .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Description */
    .info-description {
      font-size: 13.5px;
      line-height: 1.7;
      color: var(--text-secondary);
      font-weight: 300;
    }

    /* Conditions */
    .info-conditions-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .info-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    /* Pills: border only, no fill */
    .pill {
      font-size: 11.5px;
      font-weight: 400;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 3px 9px;
      white-space: nowrap;
    }

    /* ============================================================
       PLAYBACK BAR
       ============================================================ */
    .playback-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    .play-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity var(--transition-fast), transform var(--transition-fast);
    }

    .play-btn:hover  { opacity: 0.82; }
    .play-btn:active { transform: scale(0.95); }

    .play-btn svg {
      width: 14px;
      height: 14px;
      fill: white;
      pointer-events: none;
    }

    .playback-status {
      font-size: 12px;
      color: var(--text-muted);
    }

    .playback-status.playing     { color: var(--accent); }
    .playback-status.unavailable { color: #b05050; }

    /* ============================================================
       SECTION HEADERS
       ============================================================ */
    .sounds-section { margin-bottom: 44px; }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .section-header h2 {
      font-family: 'Fraunces', serif;
      font-size: 17px;
      font-weight: 300;
      color: var(--text-primary);
    }

    .section-header .section-type {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    /* ============================================================
       SOUND CARD GRID
       auto-fill min 160px; collapses to 1 col at <=480px.
       ============================================================ */
    .sounds-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    /* ============================================================
       SOUND CARD
       Accent bar via ::before — no overflow:hidden on the card.
       ============================================================ */
    .sound-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 14px 13px;
      cursor: pointer;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast), transform var(--transition-fast);
    }

    /* Top accent bar — border-radius matches card top corners,
       so no overflow:hidden is needed on the parent */
    .sound-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      background: var(--card-accent, var(--accent));
      opacity: 0.45;
      transition: opacity var(--transition-fast);
    }

    .sound-card:hover               { border-color: #ccc; box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .sound-card:hover::before       { opacity: 0.85; }
    .sound-card.active              { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(74,111,165,.12); }
    .sound-card.active::before      { opacity: 1; }

    .card-icon {
      margin-bottom: 9px;
      display: flex;
    }

    .card-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--card-accent, var(--accent));
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      opacity: 0.55;
      transition: opacity var(--transition-fast);
    }

    .sound-card.active .card-icon svg,
    .sound-card:hover  .card-icon svg { opacity: 0.9; }

    .card-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.35;
      margin-bottom: 4px;
    }

    .card-tag {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
      font-weight: 300;
    }

    /* Hidden audio element — src swapped by JS on each selection */
    #audio-player { display: none; }

    /* ============================================================
       MOBILE — <=680px: stack panel vertically
       ============================================================ */
    @media (max-width: 680px) {
      .viz-panel,
      .viz-panel.sound-selected {
        grid-template-columns: 1fr;
        gap: 24px;
        padding: 24px;
      }

      .viz-panel.sound-selected #lung-svg { max-width: 200px; }

      /* Info column always in flow on mobile —
         do not wait for .sound-selected */
      .info-column { display: flex !important; }
    }

    /* <=480px: single-column card grid */
    @media (max-width: 480px) {
      .sounds-grid  { grid-template-columns: 1fr; }
      .main-content { padding: 24px 16px 0; }
      .site-header  { padding: 36px 20px 28px; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <h1>Lung Sounds Explorer</h1>
    <p class="subtitle">Select a sound to highlight anatomy, read clinical context, and listen to audio examples.</p>
  </header>

  <main class="main-content">

    <!-- ============================================================
         VISUALIZATION PANEL
         Default: SVG centred in single column.
         JS adds .sound-selected → two-column layout on desktop.
         ============================================================ -->
    <section class="viz-panel" id="viz-panel" aria-label="Lung diagram and sound information">

      <!-- SVG COLUMN -->
      <div class="svg-column">
        <!--
          LUNG SVG viewBox="0 0 260 230"
          .svg-region elements: opacity 0.08 by default.
          JS adds .highlighted → opacity 0.85 + colour glow.
          .lung-outline: always fully visible.
        -->
        <svg id="lung-svg" viewBox="0 0 260 230" xmlns="http://www.w3.org/2000/svg"
             role="img" aria-label="Lung anatomy diagram">
          <defs>
            <style>
              .lung-outline {
                fill: none;
                stroke: #b0b0a8;
                stroke-width: 1.6;
                stroke-linecap: round;
                stroke-linejoin: round;
              }
            </style>
          </defs>

          <!-- TRACHEA & CARINA — amber -->
          <g id="svg-trachea" class="svg-region" style="--region-color:#c49a3c">
            <rect x="122" y="10" width="16" height="40" rx="6" fill="#c49a3c"/>
            <path d="M122 50 Q110 62 96 70"  stroke="#c49a3c" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M138 50 Q150 62 164 70" stroke="#c49a3c" stroke-width="4" fill="none" stroke-linecap="round"/>
          </g>

          <!-- LUNG OUTLINES (always visible) -->
          <path class="lung-outline" d="M96 70 Q80 80 70 100 Q58 125 58 148 Q58 175 68 192 Q80 210 96 215 Q112 218 120 210 Q128 200 128 185 L128 90 Q128 78 122 72 Z"/>
          <path class="lung-outline" d="M164 70 Q180 80 190 100 Q202 125 202 148 Q202 175 192 192 Q180 210 164 215 Q148 218 140 210 Q132 200 132 185 L132 90 Q132 78 138 72 Z"/>

          <!-- LEFT BRONCHUS — amber -->
          <g id="svg-bronchi-left" class="svg-region" style="--region-color:#c49a3c">
            <path d="M96 70 Q84 80 80 95 Q80 108 88 112"  stroke="#c49a3c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
            <path d="M88 112 Q82 120 80 130"              stroke="#c49a3c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M88 112 Q96 116 98 126"              stroke="#c49a3c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          </g>

          <!-- RIGHT BRONCHUS — amber -->
          <g id="svg-bronchi-right" class="svg-region" style="--region-color:#c49a3c">
            <path d="M164 70 Q176 80 180 95 Q180 108 172 112" stroke="#c49a3c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
            <path d="M172 112 Q178 120 180 130"               stroke="#c49a3c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M172 112 Q164 116 162 126"               stroke="#c49a3c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          </g>

          <!-- LEFT PARENCHYMA — blue -->
          <g id="svg-parenchyma-left" class="svg-region" style="--region-color:#5580b0">
            <path d="M96 70 Q80 80 70 100 Q58 125 58 148 Q58 175 68 192 Q80 210 96 215 Q112 218 120 210 Q128 200 128 185 L128 90 Q128 78 122 72 Z"
                  fill="#5580b0" stroke="none"/>
          </g>

          <!-- RIGHT PARENCHYMA — blue -->
          <g id="svg-parenchyma-right" class="svg-region" style="--region-color:#5580b0">
            <path d="M164 70 Q180 80 190 100 Q202 125 202 148 Q202 175 192 192 Q180 210 164 215 Q148 218 140 210 Q132 200 132 185 L132 90 Q132 78 138 72 Z"
                  fill="#5580b0" stroke="none"/>
          </g>

          <!-- LEFT BASE — teal -->
          <g id="svg-bases-left" class="svg-region" style="--region-color:#4a8c78">
            <path d="M62 160 Q60 175 68 192 Q80 210 96 215 Q112 218 120 210 Q128 200 128 185 L128 160 Z"
                  fill="#4a8c78" stroke="none"/>
          </g>

          <!-- RIGHT BASE — teal -->
          <g id="svg-bases-right" class="svg-region" style="--region-color:#4a8c78">
            <path d="M198 160 Q200 175 192 192 Q180 210 164 215 Q148 218 140 210 Q132 200 132 185 L132 160 Z"
                  fill="#4a8c78" stroke="none"/>
          </g>

          <!-- LEFT PLEURA — violet, dashed stroke only -->
          <g id="svg-pleura-left" class="svg-region" style="--region-color:#7c6fa0">
            <path d="M93 68 Q75 78 64 100 Q51 127 51 150 Q51 178 63 196 Q77 215 96 220 Q116 223 126 212 Q134 202 134 185 L134 88 Q134 75 127 69 Z"
                  fill="none" stroke="#7c6fa0" stroke-width="2" stroke-dasharray="5 3"/>
          </g>

          <!-- RIGHT PLEURA — violet, dashed stroke only -->
          <g id="svg-pleura-right" class="svg-region" style="--region-color:#7c6fa0">
            <path d="M167 68 Q185 78 196 100 Q209 127 209 150 Q209 178 197 196 Q183 215 164 220 Q144 223 134 212 Q126 202 126 185 L126 88 Q126 75 133 69 Z"
                  fill="none" stroke="#7c6fa0" stroke-width="2" stroke-dasharray="5 3"/>
          </g>

          <!-- Fissure hints -->
          <path class="lung-outline" d="M75 130 Q82 128 90 130" stroke-dasharray="3 2" stroke-width="1"/>
          <path class="lung-outline" d="M185 130 Q178 128 170 130" stroke-dasharray="3 2" stroke-width="1"/>
        </svg>

        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#c49a3c"></div>Airways</div>
          <div class="legend-item"><div class="legend-dot" style="background:#4a8c78"></div>Bases</div>
          <div class="legend-item"><div class="legend-dot" style="background:#5580b0"></div>Parenchyma</div>
          <div class="legend-item"><div class="legend-dot" style="background:#7c6fa0"></div>Pleura</div>
        </div>
      </div>

      <!-- INFO COLUMN
           Desktop: display:none → JS sets display:flex on first selection.
           Mobile (<=680px): display:flex unconditionally via !important.
           No overflow:hidden anywhere — iOS Safari. -->
      <div class="info-column" id="info-column" aria-live="polite">

        <div id="info-placeholder">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
          <p>Select a sound below<br>to view clinical details.</p>
        </div>

        <div id="info-content" style="display:none; flex-direction:column; gap:18px;">
          <p class="info-name" id="info-name"></p>
          <div class="info-region-label">
            <div class="dot" id="info-region-dot"></div>
            <span id="info-region-label"></span>
          </div>
          <p class="info-description" id="info-description"></p>
          <div>
            <p class="info-conditions-label">Associated conditions</p>
            <div class="info-pills" id="info-pills"></div>
          </div>
          <div class="playback-bar">
            <button class="play-btn" id="play-btn" aria-label="Play or pause audio">
              <svg id="play-icon" viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg>
              <svg id="pause-icon" viewBox="0 0 24 24" style="display:none">
                <rect x="6" y="4" width="4" height="16" rx="1"/>
                <rect x="14" y="4" width="4" height="16" rx="1"/>
              </svg>
            </button>
            <span class="playback-status" id="playback-status">Click to play</span>
          </div>
        </div>

      </div>
    </section>

    <!-- NORMAL SOUNDS -->
    <section class="sounds-section">
      <div class="section-header">
        <h2>Normal Breath Sounds</h2>
        <span class="section-type">3 sounds</span>
      </div>
      <div class="sounds-grid" id="grid-normal"></div>
    </section>

    <!-- ABNORMAL SOUNDS -->
    <section class="sounds-section">
      <div class="section-header">
        <h2>Adventitious Sounds</h2>
        <span class="section-type">6 sounds</span>
      </div>
      <div class="sounds-grid" id="grid-abnormal"></div>
    </section>

  </main>

  <!-- Single hidden audio element. src is swapped by JS on each selection. -->
  <audio id="audio-player"></audio>

  <script>
  /* ============================================================
     SOUND DATA
     file: path relative to the HTML file.
     Put your MP3s in a folder called "sounds" next to this file.
     Expected filenames are shown in the file property below.
     ============================================================ */
  const lungSounds = {
    vesicular: {
      file: 'sounds/vesicular.mp3',
      name: 'Vesicular',
      description: 'Soft, low-pitched sounds heard over most lung fields. Inspiration is longer than expiration with no pause between phases. Produced by airflow through peripheral small airways — the hallmark of healthy lung tissue.',
      diseases: ['Healthy lung', 'Normal baseline'],
      region: 'normal',
      type: 'normal',
      tag: 'Soft · Low-pitched'
    },
    bronchial: {
      file: 'sounds/bronchial.mp3',
      name: 'Bronchial',
      description: 'Loud, high-pitched sounds normally heard over the trachea and manubrium. Expiration is longer than inspiration with a distinct pause. When heard peripherally, they suggest consolidation.',
      diseases: ['Normal over trachea', 'Lobar pneumonia', 'Consolidation'],
      region: 'bronchi',
      type: 'normal',
      tag: 'Loud · High-pitched · Tubular'
    },
    bronchovesicular: {
      file: 'sounds/bronchovesicular.mp3',
      name: 'Bronchovesicular',
      description: 'Intermediate between bronchial and vesicular in pitch and intensity. Inspiration and expiration are roughly equal in duration. Normally heard near the main bronchi — 1st to 2nd intercostal spaces anteriorly, or between the scapulae posteriorly.',
      diseases: ['Normal over main bronchi', 'Early consolidation'],
      region: 'bronchi',
      type: 'normal',
      tag: 'Intermediate · Equal phases'
    },
    wheeze: {
      file: 'sounds/wheeze.mp3',
      name: 'Wheeze',
      description: 'Continuous, musical, high-pitched sounds from narrowed or obstructed airways. Predominantly expiratory but may be biphasic. Polyphonic wheezes suggest diffuse narrowing; a monophonic wheeze may indicate fixed obstruction.',
      diseases: ['Asthma', 'COPD', 'Anaphylaxis', 'Foreign body aspiration'],
      region: 'bronchi',
      type: 'abnormal',
      tag: 'Continuous · High-pitched'
    },
    crackles: {
      file: 'sounds/crackles.mp3',
      name: 'Crackles / Rales',
      description: 'Discontinuous, non-musical sounds from sudden opening of collapsed airways or fluid-filled alveoli during inspiration. Fine crackles resemble Velcro peeling; coarse crackles are louder and lower-pitched. Typically heard at the bases.',
      diseases: ['Pulmonary fibrosis', 'Pulmonary oedema', 'Pneumonia', 'Heart failure'],
      region: 'alveoli',
      type: 'abnormal',
      tag: 'Discontinuous · Inspiratory'
    },
    rhonchi: {
      file: 'sounds/rhonchi.mp3',
      name: 'Rhonchi',
      description: 'Low-pitched, continuous, rumbling sounds from secretions or dynamic narrowing in larger airways. Predominantly expiratory. May clear with coughing — unlike crackles. Suggests mucus hypersecretion or endobronchial pathology.',
      diseases: ['Chronic bronchitis', 'COPD exacerbation', 'Bronchiectasis'],
      region: 'bronchi',
      type: 'abnormal',
      tag: 'Continuous · Low-pitched'
    },
    stridor: {
      file: 'sounds/stridor.mp3',
      name: 'Stridor',
      description: 'A high-pitched, harsh, monophonic sound from turbulent airflow through a critically narrowed upper airway. Predominantly inspiratory, often audible without a stethoscope. Stridor is a medical emergency until a reversible cause is excluded.',
      diseases: ['Croup', 'Epiglottitis', 'Tracheal stenosis', 'Foreign body', 'Anaphylaxis'],
      region: 'trachea',
      type: 'abnormal',
      tag: 'Inspiratory · Harsh · Monophonic'
    },
    pleuralRub: {
      file: 'sounds/pleural-rub.mp3',
      name: 'Pleural Friction Rub',
      description: 'A coarse, grating sound when inflamed pleural surfaces move against each other during breathing. Heard in both phases, does not clear with coughing. Disappears if a pleural effusion develops and separates the surfaces.',
      diseases: ['Pleuritis', 'Pulmonary embolism', 'Pneumonia with pleuritis', 'Mesothelioma'],
      region: 'pleura',
      type: 'abnormal',
      tag: 'Biphasic · Grating'
    },
    decreasedBS: {
      file: 'sounds/decreased-breath-sounds.mp3',
      name: 'Decreased Breath Sounds',
      description: 'Reduced or absent sounds from diminished airflow, increased chest-wall distance, or attenuated transmission. Best appreciated by comparing symmetrical zones. Unilateral decrease warrants further workup.',
      diseases: ['Pleural effusion', 'Pneumothorax', 'COPD', 'Obesity', 'Consolidation'],
      region: 'parenchyma',
      type: 'abnormal',
      tag: 'Reduced amplitude'
    }
  };

  /* ============================================================
     REGION → SVG element IDs to highlight
     ============================================================ */
  const regionToSVGIds = {
    trachea:    ['svg-trachea'],
    bronchi:    ['svg-bronchi-left', 'svg-bronchi-right'],
    alveoli:    ['svg-bases-left', 'svg-bases-right'],
    pleura:     ['svg-pleura-left', 'svg-pleura-right'],
    parenchyma: ['svg-parenchyma-left', 'svg-parenchyma-right'],
    normal:     ['svg-parenchyma-left', 'svg-parenchyma-right', 'svg-bases-left', 'svg-bases-right']
  };

  const regionMeta = {
    trachea:    { label: 'Trachea / Upper Airway', color: '#c49a3c' },
    bronchi:    { label: 'Bronchi',                color: '#c49a3c' },
    alveoli:    { label: 'Alveoli / Lung Bases',   color: '#4a8c78' },
    pleura:     { label: 'Pleura',                 color: '#7c6fa0' },
    parenchyma: { label: 'Lung Parenchyma',        color: '#5580b0' },
    normal:     { label: 'All Lung Fields',        color: '#4a6fa5' }
  };

  const regionCardColor = {
    trachea:    '#c49a3c',
    bronchi:    '#c49a3c',
    alveoli:    '#4a8c78',
    pleura:     '#7c6fa0',
    parenchyma: '#5580b0',
    normal:     '#4a6fa5'
  };

  /* Waveform icon */
  function waveformIcon() {
    return `<svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M2 12h2M6 8v8M10 6v12M14 9v6M18 7v10M22 12h-2"/>
    </svg>`;
  }

  /* ============================================================
     BUILD SOUND CARDS
     Injects cards into #grid-normal or #grid-abnormal at load.
     ============================================================ */
  function buildCards() {
    const gridNormal   = document.getElementById('grid-normal');
    const gridAbnormal = document.getElementById('grid-abnormal');

    Object.entries(lungSounds).forEach(([key, sound]) => {
      const accent = regionCardColor[sound.region] || '#4a6fa5';
      const card   = document.createElement('article');
      card.className = 'sound-card';
      card.setAttribute('data-key', key);
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', `${sound.name}: ${sound.tag}`);
      card.style.setProperty('--card-accent', accent);

      card.innerHTML = `
        <div class="card-icon">${waveformIcon()}</div>
        <p class="card-name">${sound.name}</p>
        <p class="card-tag">${sound.tag}</p>
      `;

      card.addEventListener('click',   ()  => selectSound(key, card));
      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectSound(key, card); }
      });

      (sound.type === 'normal' ? gridNormal : gridAbnormal).appendChild(card);
    });
  }

  /* ============================================================
     STATE
     ============================================================ */
  let activeKey  = null;
  let activeCard = null;
  let isPlaying  = false;

  const audioPlayer     = document.getElementById('audio-player');
  const vizPanel        = document.getElementById('viz-panel');
  const infoColumn      = document.getElementById('info-column');
  const infoPlaceholder = document.getElementById('info-placeholder');
  const infoContent     = document.getElementById('info-content');
  const infoName        = document.getElementById('info-name');
  const infoRegionDot   = document.getElementById('info-region-dot');
  const infoRegionLabel = document.getElementById('info-region-label');
  const infoDesc        = document.getElementById('info-description');
  const infoPills       = document.getElementById('info-pills');
  const playBtn         = document.getElementById('play-btn');
  const playIcon        = document.getElementById('play-icon');
  const pauseIcon       = document.getElementById('pause-icon');
  const playbackStatus  = document.getElementById('playback-status');

  /* ============================================================
     HIGHLIGHT SVG REGIONS
     Clears all .highlighted first, then adds to matching IDs.
     ============================================================ */
  function highlightRegions(region) {
    document.querySelectorAll('.svg-region').forEach(el => el.classList.remove('highlighted'));
    (regionToSVGIds[region] || []).forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.add('highlighted');
    });
  }

  /* ============================================================
     UPDATE INFO CARD CONTENT
     ============================================================ */
  function updateInfoCard(key) {
    const sound = lungSounds[key];
    const meta  = regionMeta[sound.region] || regionMeta.normal;

    infoName.textContent           = sound.name;
    infoRegionDot.style.background = meta.color;
    infoRegionLabel.textContent    = meta.label;
    infoDesc.textContent           = sound.description;

    infoPills.innerHTML = '';
    sound.diseases.forEach(d => {
      const pill = document.createElement('span');
      pill.className   = 'pill';
      pill.textContent = d;
      infoPills.appendChild(pill);
    });

    setPlaybackState('idle');
  }

  /* ============================================================
     PLAYBACK STATE MACHINE
     States: idle | playing | paused | finished | unavailable
     ============================================================ */
  function setPlaybackState(state) {
    isPlaying = (state === 'playing');
    playIcon.style.display  = isPlaying ? 'none'  : 'block';
    pauseIcon.style.display = isPlaying ? 'block' : 'none';

    const map = {
      idle:        'Click to play',
      playing:     'Playing…',
      paused:      'Paused',
      finished:    'Finished',
      unavailable: 'File not available'
    };
    playbackStatus.className   = 'playback-status';
    playbackStatus.textContent = map[state] || '';
    if (state === 'playing')     playbackStatus.classList.add('playing');
    if (state === 'unavailable') playbackStatus.classList.add('unavailable');
  }

  /* Play / pause button */
  playBtn.addEventListener('click', () => {
    if (!activeKey) return;
    if (isPlaying) {
      audioPlayer.pause();
      setPlaybackState('paused');
    } else {
      audioPlayer.play().catch(() => setPlaybackState('unavailable'));
      setPlaybackState('playing');
    }
  });

  audioPlayer.addEventListener('ended', () => setPlaybackState('finished'));
  audioPlayer.addEventListener('error', () => setPlaybackState('unavailable'));

  /* ============================================================
     SELECT SOUND
     Called on card click. Drives all state changes.
     ============================================================ */
  function selectSound(key, card) {
    audioPlayer.pause();
    audioPlayer.currentTime = 0;

    if (activeCard) activeCard.classList.remove('active');
    activeKey  = key;
    activeCard = card;
    card.classList.add('active');

    const sound = lungSounds[key];

    /* LAYOUT — .sound-selected added to viz-panel.
       Desktop: triggers two-column CSS grid transition.
       Mobile: no-op for layout (already stacked). */
    vizPanel.classList.add('sound-selected');

    /* INFO COLUMN VISIBILITY (desktop)
       display:none → display:flex via JS.
       On mobile the CSS !important makes this a no-op. */
    infoColumn.style.display      = 'flex';
    infoPlaceholder.style.display = 'none';
    infoContent.style.display     = 'flex';

    /* SVG region highlight */
    highlightRegions(sound.region);

    /* Info card content */
    updateInfoCard(key);

    /* Audio — swap src and play.
       Missing file triggers the 'error' event → unavailable state. */
    audioPlayer.src = sound.file;
    audioPlayer.load();
    audioPlayer.play()
      .then(()  => setPlaybackState('playing'))
      .catch(() => setPlaybackState('unavailable'));
  }

  /* Init */
  buildCards();
  </script>

</body>
</html>
